# XRD数据质量评价系统配置文件

# 评分权重配置（默认值）
SCORING:
  WEIGHTS:
    信息完整性: 40
    数据规范性: 15
    内容一致性: 10
    过程可追溯性: 20
    智能可用性: 15
  
  # 等级划分
  GRADE_THRESHOLDS:
    A_LEVEL: 70
    B_LEVEL: 50
    C_LEVEL: 0

# 评分标准描述
CRITERIA:
  信息完整性:
    样品信息: "成分+标识+工艺=12；成分+标识=9；仅成分=6；仅代号=0"
    辐射源: "参数+电压+电流=15；参数+电压/电流=10；参数=8"
    扫描参数: "范围+步长+模式=10；缺步长=3；缺范围=6；缺模式=8；缺2类及以上=0"
    仪器信息: "型号+制造商=3；缺=0"
  
  数据规范性:
    数据完整性: "结构化数据：缺失率≤1% =10分，1-5%=7，>5%=0；（或是图像数据：清晰完整=10，基本清晰=7，模糊=0）"
    单位标注: "2θ单位+强度+坐标轴齐=5；缺1项=4；缺2项=2；三项缺失=0"
  
  内容一致性: "文献+多源验证=10；仅文献或仅验证=8；无参照但样品完整=5；无参照且不完整=2；造假=0"
  
  过程可追溯性:
    数据状态: "原文件有效=14；损坏=7；无原文件时：标原始（缺失<2%）=10，（2-5%）=7，（≥5%）=4"
    测试信息: "校准+环境=6；仅校准=2；仅环境=1；均缺失=0"
  
  智能可用性:
    机器可读: "标准格式=10；结构化=8；高质量图=5；其他=2"
    特征标签: "含相标注/PDF卡片号/Miller指数任一=5；模糊标签=2；无标签=0"


# 提示词配置
PROMPTS:
  # 文件信息提取提示词
  FILE_EXTRACTION: |
    你是一个专业的XRD测试报告分析专家。从XRD报告或数据描述中提取以下关键信息：
    1. 样品信息：材料成分、样品标识、制备工艺
    2. 辐射源：靶材类型、管电压、管电流
    3. 扫描参数：扫描范围(2θ)、步长、扫描模式
    4. 仪器信息：仪器型号、制造商
    5. 数据格式：数据文件格式（原始文件/结构化数据/图像）
    6. 数据完整性：数据点数量、图像质量
    7. 单位标注：2θ单位、强度单位、坐标轴标注
    8. 内容一致性：文献参照、多源验证数据
    9. 测试信息：校准信息、测试环境、样品状态
    10. 特征标签：相标注、PDF卡片号、Miller指数
    如某项信息没有明确提到，写未提及。
    以清晰的结构化格式输出提取信息，方便后续评分。

  # 基础评分提示词模板
  SCORING_TEMPLATE: |
    你是一个专业的XRD数据质量评分专家。{strictness_description}
    
    【评分标准】
    {criteria_section}
    
    用户设置的权重（用于最终计算）
    {weights_section}
    
    【权重调整计算方法】
    重要：请按以下步骤计算：
    1. 先按照原始评分标准打分
    2. 得到维度原始总分，原始得分不得超过满分
    3. 按公式计算调整后得分：调整后得分 = (维度原始总分 ÷ 原始维度满分) × 用户设置权重
    
    【计算示例】
    以"信息完整性"为例，得分35分，如果用户设置权重为30分，调整后得分 = (35 ÷ 40) × 30 = 26.25分
    
    【等级评定】
    等级A: ≥{grade_A}分
    等级B: {grade_B}-{grade_A_minus_1}分  
    等级C: {grade_C}-{grade_B_minus_1}分
    等级D: <{grade_C}分
    
    【输出格式】
    样品信息：（针对样品的打分理由）（得分）。例：Al2O3，Sigma-Aldrich CAS号1344-28-1，压片制样（12分,按权重调整后得分为(12 ÷ 40) × 30 = 9分）
    辐射源：
    扫描参数：
    仪器信息：
    数据完整性：
    单位标注：
    内容一致性：
    数据状态：
    测试信息：
    机器可读：
    智能可用性：
    总分：[总分]分，[等级]
    严格按此格式输出，不加其他内容，不要漏评错评，确保所有计算准确无误，必须根据用户设置的权重计算,调整后得分必须明确计算写出




# 严格度配置
STRICTNESS_LEVELS:
  宽松: "采用宽松评分标准，对于次要信息缺失可酌情给分。"
  标准: "采用标准评分标准，严格按照原始评分标准执行。"
  严格: "采用严格评分标准，任何信息缺失都将严格扣分。"
  科研级: "采用科研级评分标准，执行最高标准，接近零容忍。"

